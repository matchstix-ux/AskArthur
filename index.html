<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cigar Finder — Famous Smoke Shop</title>
  <style>
    :root {
      --bg:             #0e1623;
      --surface:        #152035;
      --surface-2:      #1a2a45;
      --border:         #243350;
      --text:           #eef0f5;
      --muted:          #8a9ab8;
      --accent:         #c8a84b;
      --accent-2:       #e8c96a;
      --accent-dim:     #3a2e10;
      --navy:           #1b3a6b;
      --navy-light:     #234d8a;
      --green:          #2a5c3a;
      --green-text:     #7ec87e;
      --strength-low:   #7ec87e;
      --strength-med:   #c8a84b;
      --strength-high:  #e05a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--navy);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent);
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .topbar-logo {
      font-size: 1.3rem;
      font-weight: 800;
      font-style: italic;
      color: white;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    .topbar-logo span {
      color: var(--accent);
    }
    .topbar-since {
      font-size: 0.68rem;
      color: #aabbdd;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .topbar-tag {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* ── Layout ── */
    .wrap { max-width: 900px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Hero heading ── */
    .hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .hero h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Search panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 8px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: var(--text);
    }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .controls input { min-width: 0; }
    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); outline: none; }

    .btn {
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-primary {
      background: var(--accent);
      color: #0e1623;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover { background: var(--accent-2); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .status { margin-top: 10px; color: var(--muted); min-height: 1.4em; font-size: 0.9rem; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 44px 20px;
      color: var(--muted);
    }
    .empty-state .ember { font-size: 2.4rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }
    .hint-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }
    .hint-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.84rem;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .hint-chip:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Grid ── */
    .grid {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    /* ── Mobile overrides ── */
    @media (max-width: 600px) {
      .wrap { padding: 20px 12px 48px; }

      .hero h1 { font-size: 1.4rem; }
      .hero p  { font-size: 0.88rem; }

      .controls { flex-direction: column; }
      .controls input { width: 100%; }
      .btn-primary { width: 100%; }
      #clearBtn { width: 100%; }

      .grid { grid-template-columns: 1fr; gap: 12px; }

      .topbar-since { display: none; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-name { font-weight: 700; font-size: 1rem; color: var(--text); }
    .card-brand { font-size: 0.88rem; color: var(--accent); font-weight: 600; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.84rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .price-badge {
      background: var(--green);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.8rem;
      color: var(--green-text);
      font-weight: 700;
    }

    /* Strength bar */
    .strength-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .strength-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s;
    }

    .card-notes { font-size: 0.87rem; color: #b0bdd4; }

    /* AI why */
    .card-why {
      font-size: 0.84rem;
      color: #a0b0cc;
      font-style: italic;
      border-left: 2px solid var(--accent);
      padding-left: 10px;
      line-height: 1.45;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.83rem;
      cursor: pointer;
      font-weight: 500;
      transition: border-color 0.15s;
    }
    .actions button:hover:not(:disabled) { border-color: var(--muted); }
    .actions button.liked {
      border-color: var(--accent);
      color: var(--accent);
    }
    .actions button:disabled { opacity: 0.45; cursor: default; }
    .btn-buy {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--accent-dim);
      border-radius: 8px;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.83rem;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-buy:hover {
      background: #4a3a14;
      border-color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo"><span>famous</span> cigars</div>
      <div class="topbar-since">Since 1939</div>
    </div>
    <div class="topbar-tag">AI Cigar Finder</div>
  </div>

  <div class="wrap">

    <div class="hero">
      <h1>Find Your <span>Perfect Cigar</span></h1>

    </div>

    <section class="panel">
      <form id="searchForm" novalidate>
        <label for="query">Enter a brand, flavors, or drink.</label>
        <div class="controls">
          <input id="query" type="text"
                 placeholder="e.g. Padron, spicy &amp; full bodied, Coffee" />
          <button type="submit" class="btn btn-primary">Find My Cigar</button>
          <button type="button" id="clearBtn" class="btn btn-ghost"
                  style="display:none">Clear</button>
        </div>
      </form>
      <div id="status" class="status"></div>
    </section>

    <div id="results"></div>

    <footer>
      <p>Powered by Famous Smoke Shop · <a href="https://www.famous-smoke.com" target="_blank">famous-smoke.com</a> · Since 1939</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
